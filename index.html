<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOPartsArts</title>
  <style>
    :root {
      --bg:        #F4F4F0;
      --fg:        #111;
      --gap:       20px;
      --bw:        1.5px;           /* ボーダー統一値 */
      --border:    rgba(0,0,0,0.18); /* 薄すぎず主張しすぎず */
      --max-width: 1000px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      /* MS UI Gothic を削除 — Courier New ベースに統一 */
      font-family: 'Courier New', Courier, monospace;
      background-image:
        linear-gradient(rgba(17,17,17,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17,17,17,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    a { color: inherit; text-decoration: none; cursor: pointer; }
    a:hover { text-decoration: underline; }

    img, video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #D8D8D5;
    }

    /* ===========================
       NAV
    =========================== */
    nav {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 100;
      background: rgba(244,244,240,0.88);
      backdrop-filter: blur(6px);
      border-bottom: var(--bw) solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo img {
      height: 32px; width: auto;
      object-fit: contain; background: transparent; display: block;
    }
    .nav-links { list-style: none; display: flex; gap: 1.5rem; }
    /* フォントサイズを 1.2rem → 0.75rem に。ロゴと競合しない */
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ===========================
       HERO SLIDER
    =========================== */
    .hero-container {
      max-width: var(--max-width);
      margin: 80px auto 2rem;
      padding: 0 1.5rem;
      position: relative;
    }
    .hero-slider {
      position: relative;
      width: 100%;
      height: 55vh;
      overflow: hidden;
      background: #E2E2DF;
      /* ボーダーを見えるレベルに */
      border: var(--bw) solid var(--border);
    }
    .slider-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .slide { min-width: 100%; height: 100%; position: relative; }
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.02);
      pointer-events: none;
    }
    .slide-info {
      position: absolute;
      bottom: 1.5rem; left: 1.5rem;
      color: #fff;
      mix-blend-mode: difference;
      z-index: 2;
    }
    .slide-title { font-size: 1rem; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; }
    .slide-sub   { font-size: 0.7rem; margin-top: 0.2rem; opacity: 0.8; }

    .slide-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: transparent; border: none;
      color: var(--fg);
      font-size: 1.2rem; font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 15;
      transition: opacity 0.2s;
    }
    .slide-btn:hover { opacity: 0.5; }
    .slide-btn.prev { left: -38px; }
    .slide-btn.next { right: -38px; }

    .slider-dots {
      position: absolute;
      bottom: 1rem; right: 1.5rem;
      display: flex; gap: 6px; z-index: 10;
    }
    .dot {
      width: 6px; height: 6px;
      border: var(--bw) solid var(--fg);
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .dot.is-active { background: var(--fg); }

    /* ===========================
       WORKS GRID
       — 3列均等を崩してリズムを作る
         奇数番目のセルを縦長にする
    =========================== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      /* 行の高さに変化をつける */
      grid-auto-rows: 280px;
      gap: var(--gap);
      max-width: var(--max-width);
      margin: 4rem auto;
      padding: 0 1.5rem;
    }
    .cell {
      position: relative;
      overflow: visible;
      background: #E2E2DF;
      border: var(--bw) solid var(--border);
      z-index: 1;
      transition: z-index 0s, box-shadow 0.3s;
    }
    .cell img, .cell video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .cell:hover { z-index: 10; box-shadow: 4px 4px 0 var(--fg); }
    .cell:hover img, .cell:hover video { transform: scale(1.05); }

    /* wfull: 全幅・2行分 */
    .cell.wfull {
      grid-column: 1 / -1;
      grid-row: span 2;
    }
    /* tall: 縦長（2行分） */
    .cell.tall { grid-row: span 2; }

    .cell-label {
      position: absolute;
      top: 10px; left: 10px;
      font-size: 0.65rem;
      background: var(--fg);
      color: var(--bg);
      padding: 2px 6px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 3;
    }
    .cell:hover .cell-label { opacity: 0.9; }

    /* ===========================
       MEMBERS
    =========================== */
    .members {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 4rem 1.5rem;
      border-top: var(--bw) solid var(--border);
    }
    .members-title {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--gap);
    }
    .member {
      position: relative; z-index: 1;
      transition: transform 0.35s cubic-bezier(0.25,1,0.5,1), box-shadow 0.35s, z-index 0s;
    }
    .member:hover {
      z-index: 10;
      transform: translate(-3px, -3px);
      box-shadow: 3px 3px 0 var(--fg);
    }
    .member-photo {
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border: var(--bw) solid var(--border);
      margin-bottom: 0.7rem;
    }
    .member-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .member:hover .member-photo img { transform: scale(1.04); }
    .member-name { font-size: 0.8rem; font-weight: bold; }
    .member-role { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-top: 0.2rem; }

    /* ===========================
       INFO
    =========================== */
    .info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: var(--bw) solid var(--border);
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .info-block { padding: 5rem 1.5rem; }
    .info-block + .info-block { border-left: var(--bw) solid var(--border); }
    .info-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .info-text { font-size: 0.85rem; line-height: 1.9; color: #222; }
    .info-text a { text-decoration: underline; }

    /* ===========================
       FOOTER
    =========================== */
    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      border-top: var(--bw) solid var(--border);
    }
    .footer-logo img { height: 24px; width: auto; opacity: 0.35; background: transparent; }

    /* ===========================
       RESPONSIVE
    =========================== */
    @media (max-width: 768px) {
      .slide-btn.prev { left: 5px; color: #fff; mix-blend-mode: difference; }
      .slide-btn.next { right: 5px; color: #fff; mix-blend-mode: difference; }
    }
    @media (max-width: 640px) {
      .hero-slider { height: 40vh; }
      .grid {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 180px;
        gap: 12px;
      }
      /* スマホでは wfull のみ特別扱い、tall は通常セルに */
      .cell.wfull { grid-column: 1 / -1; grid-row: span 1; }
      .cell.tall  { grid-row: span 1; }
      .info { grid-template-columns: 1fr; }
      .info-block + .info-block { border-left: none; border-top: var(--bw) solid var(--border); }
    }

    @media (prefers-reduced-motion: reduce) {
      .slider-wrapper { transition: none; }
      .cell:hover img, .cell:hover video { transform: none; }
      .member:hover { transform: none; box-shadow: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo"><img src="logo.png" alt="OOPartsArts" /></a>
    <ul class="nav-links">
      <li><a href="#works">Works</a></li>
      <li><a href="#members">Members</a></li>
      <li><a href="#info">Info</a></li>
    </ul>
  </nav>

  <div class="hero-container">
    <button class="slide-btn prev" id="slide-prev">&#8592;</button>
    <div class="hero-slider" id="hero-slider">
      <div class="slider-wrapper" id="slider-wrapper"></div>
      <div class="slider-dots"   id="slider-dots"></div>
    </div>
    <button class="slide-btn next" id="slide-next">&#8594;</button>
  </div>

  <section class="grid" id="works"></section>

  <section class="members" id="members">
    <p class="members-title">Members</p>
    <div class="members-grid" id="members-grid"></div>
  </section>

  <div class="info" id="info">
    <div class="info-block">
      <p class="info-label">About</p>
      <p class="info-text" id="about-text"></p>
    </div>
    <div class="info-block">
      <p class="info-label">Contact</p>
      <p class="info-text" id="contact-text"></p>
    </div>
  </div>

  <footer>
    <span class="footer-logo"><img src="logo.png" alt="OOPartsArts" /></span>
    <span>© 2026 OOPartsArts</span>
  </footer>

  <script>
    /* ============================================================
       siteData — ここだけ編集すればサイト全体が更新される
       works の gridClass:
         ""       : 通常 (1列 × 1行)
         "tall"   : 縦長 (1列 × 2行)
         "wfull"  : 全幅 (3列 × 2行)
    ============================================================ */
    const siteData = {
      heroSlides: [
        { type: "image", url: "logo.png",  title: "OOPartsArts Tokyo", sub: "Collective of creators, designers & makers" },
        { type: "image", url: "",          title: "New Archives",       sub: "Selected recording & visual artifacts" }
      ],
      works: [
        { type: "video", url: "sample.mp4",  poster: "poster-a.jpg", title: "作品 A", label: "Work A", gridClass: "tall" },
        { type: "image", url: "",            title: "作品 B", label: "Work B", gridClass: "" },
        { type: "video", url: "sample2.mp4", poster: "",             title: "作品 C", label: "Work C", gridClass: "" },
        { type: "image", url: "",            title: "作品 D", label: "Work D", gridClass: "" },
        { type: "image", url: "",            title: "作品 E", label: "Work E", gridClass: "" },
        { type: "image", url: "",            title: "作品 F", label: "Work F", gridClass: "" },
        { type: "image", url: "",            title: "作品 G", label: "Work G", gridClass: "" },
        { type: "image", url: "",            title: "作品 H", label: "Work H", gridClass: "" },
        { type: "image", url: "",            title: "作品 I", label: "Work I", gridClass: "" },
        { type: "image", url: "",            title: "作品 J", label: "Work J", gridClass: "" },
        { type: "image", url: "",            title: "作品 K", label: "Work K", gridClass: "wfull" },
        { type: "image", url: "",            title: "作品 L", label: "Work L", gridClass: "" },
        { type: "image", url: "",            title: "作品 M", label: "Work M", gridClass: "" },
        { type: "image", url: "",            title: "作品 N", label: "Work N", gridClass: "" }
      ],
      members: [
        { name: "名前 A", role: "Designer",     photoUrl: "" },
        { name: "名前 B", role: "Photographer", photoUrl: "" },
        { name: "名前 C", role: "Illustrator",  photoUrl: "" },
        { name: "名前 D", role: "Writer",        photoUrl: "" }
      ],
      info: {
        about:           "チームの紹介文をここに書いてください。<br />何をしているチームで、どんなものを作っているか。<br />2〜3文で。",
        email:           "hello@example.com",
        instagramUrl:    "https://instagram.com/",
        instagramHandle: "@handle"
      }
    };

    document.addEventListener("DOMContentLoaded", () => {

      /* ---------- 1. HERO SLIDER ---------- */
      const sliderWrapper = document.getElementById("slider-wrapper");
      const dotsContainer = document.getElementById("slider-dots");

      sliderWrapper.innerHTML = siteData.heroSlides.map(slide => {
        const media = slide.type === "video"
          ? `<video src="${slide.url}" autoplay loop muted playsinline></video>`
          : `<img src="${slide.url}" alt="${slide.title}" />`;
        return `<div class="slide">${media}<div class="slide-info"><h2 class="slide-title">${slide.title}</h2><p class="slide-sub">${slide.sub}</p></div></div>`;
      }).join('');

      dotsContainer.innerHTML = siteData.heroSlides.map((_, i) =>
        `<span class="dot ${i === 0 ? 'is-active' : ''}" data-index="${i}"></span>`
      ).join('');

      let current = 0;
      const total = siteData.heroSlides.length;
      const dots  = document.querySelectorAll('.dot');

      function goTo(index) {
        current = (index + total) % total;
        sliderWrapper.style.transform = `translate3d(-${current * 100}%, 0, 0)`;
        dots.forEach((d, i) => d.classList.toggle('is-active', i === current));
      }

      let timer = setInterval(() => goTo(current + 1), 4000);
      function reset() { clearInterval(timer); timer = setInterval(() => goTo(current + 1), 4000); }

      document.getElementById('slide-prev').addEventListener('click', () => { goTo(current - 1); reset(); });
      document.getElementById('slide-next').addEventListener('click', () => { goTo(current + 1); reset(); });
      dots.forEach(d => d.addEventListener('click', e => { goTo(+e.target.dataset.index); reset(); }));

      /* ---------- スワイプ対応 ---------- */
      let touchStartX = 0;
      const slider = document.getElementById('hero-slider');
      slider.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
      slider.addEventListener('touchend',   e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) { goTo(diff > 0 ? current + 1 : current - 1); reset(); }
      });

      /* ---------- 2. WORKS GRID ---------- */
      const grid = document.getElementById("works");
      grid.innerHTML = siteData.works.map(work => {
        const media = work.type === "video"
          ? `<video src="${work.url}" poster="${work.poster || ''}" loop muted preload="metadata" playsinline></video>`
          : `<img src="${work.url}" alt="${work.title}" />`;
        return `<div class="cell ${work.gridClass}">${media}<span class="cell-label">${work.label}</span></div>`;
      }).join('');

      /* 動画ホバー再生 */
      grid.querySelectorAll('.cell').forEach(cell => {
        const video = cell.querySelector('video');
        if (!video) return;
        cell.addEventListener('mouseenter', () => video.play().catch(() => {}));
        cell.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
      });

      /* ---------- 3. MEMBERS ---------- */
      document.getElementById("members-grid").innerHTML = siteData.members.map(m => `
        <div class="member">
          <div class="member-photo"><img src="${m.photoUrl}" alt="${m.name}" /></div>
          <div class="member-info">
            <p class="member-name">${m.name}</p>
            <p class="member-role">${m.role}</p>
          </div>
        </div>
      `).join('');

      /* ---------- 4. INFO ---------- */
      document.getElementById("about-text").innerHTML   = siteData.info.about;
      document.getElementById("contact-text").innerHTML = `
        <a href="mailto:${siteData.info.email}">${siteData.info.email}</a><br />
        Instagram: <a href="${siteData.info.instagramUrl}" target="_blank">${siteData.info.instagramHandle}</a>
      `;
    });
  </script>
</body>
</html>
